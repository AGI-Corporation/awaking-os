<svg id="awaking-banner" viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg" width="1200" height="300">
  <defs>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="1" y2="1">
      <stop id="gs1" offset="0%" stop-color="#050016"/>
      <stop id="gs2" offset="50%" stop-color="#120a2e"/>
      <stop id="gs3" offset="100%" stop-color="#020617"/>
    </linearGradient>
    <radialGradient id="nebula1" cx="20%" cy="30%" r="35%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nebula2" cx="75%" cy="70%" r="40%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nebula3" cx="55%" cy="15%" r="30%">
      <stop offset="0%" stop-color="#f97316" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#f97316" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <style>
    @keyframes bgPulse {
      0%,100% { opacity:1; }
      50% { opacity:0.7; }
    }
    @keyframes nebulaDrift {
      0%,100% { transform: translate(0,0) scale(1); }
      33% { transform: translate(20px,-15px) scale(1.05); }
      66% { transform: translate(-10px,10px) scale(0.97); }
    }
    @keyframes twinkle {
      0%,100% { opacity:0.15; }
      50% { opacity:1; }
    }
    @keyframes drift {
      0% { transform: translateX(0); }
      100% { transform: translateX(-30px); }
    }
    @keyframes logoGlow {
      0%,100% { filter: drop-shadow(0 0 6px #7dd3fc); fill: #e0f2fe; }
      50% { filter: drop-shadow(0 0 20px #a855f7) drop-shadow(0 0 40px #22d3ee); fill: #ffffff; }
    }
    @keyframes bootLine {
      0% { opacity:0; transform:translateY(10px); }
      100% { opacity:1; transform:translateY(0); }
    }
    @keyframes cursorBlink {
      0%,100% { opacity:1; }
      50% { opacity:0; }
    }
    @keyframes scanline {
      0% { transform: translateY(-300px); }
      100% { transform: translateY(300px); }
    }
    .nebula1 { animation: nebulaDrift 18s ease-in-out infinite; }
    .nebula2 { animation: nebulaDrift 22s ease-in-out infinite reverse; }
    .nebula3 { animation: nebulaDrift 15s ease-in-out infinite 3s; }
    .s1 { animation: twinkle 2.1s ease-in-out infinite; }
    .s2 { animation: twinkle 3.4s ease-in-out infinite 0.5s; }
    .s3 { animation: twinkle 1.8s ease-in-out infinite 1.2s; }
    .s4 { animation: twinkle 4.0s ease-in-out infinite 0.3s; }
    .s5 { animation: twinkle 2.7s ease-in-out infinite 1.8s; }
    .s6 { animation: twinkle 3.1s ease-in-out infinite 0.9s; }
    .s7 { animation: twinkle 1.5s ease-in-out infinite 2.2s; }
    .s8 { animation: twinkle 4.5s ease-in-out infinite 0.7s; }
    .s9 { animation: twinkle 2.3s ease-in-out infinite 1.5s; }
    .s10 { animation: twinkle 3.8s ease-in-out infinite 0.1s; }
    .s11 { animation: twinkle 2.9s ease-in-out infinite 2.6s; }
    .s12 { animation: twinkle 1.6s ease-in-out infinite 0.4s; }
    .logo { animation: logoGlow 4s ease-in-out infinite; font-family: "SF Pro Display","Segoe UI",system-ui,sans-serif; fill: #e0f2fe; font-size: 46px; font-weight: 700; letter-spacing: 0.1em; }
    .boot-line { font-family: "JetBrains Mono","Fira Code",Menlo,monospace; fill: #94a3b8; font-size: 14px; opacity: 0; animation: bootLine 0.6s ease-out forwards; }
    .boot-ok { fill: #4ade80; }
    .boot-warn { fill: #facc15; }
    .cursor { animation: cursorBlink 1s step-end infinite; fill: #7dd3fc; }
    .scanline { animation: scanline 6s linear infinite; opacity: 0.03; }
    #l1 { animation-delay: 0.5s; }
    #l2 { animation-delay: 1.1s; }
    #l3 { animation-delay: 1.7s; }
    #l4 { animation-delay: 2.3s; }
    #l5 { animation-delay: 2.9s; }
  </style>

  <!-- Background -->
  <rect width="1200" height="300" fill="url(#bg-grad)"/>

  <!-- Nebula layers -->
  <rect class="nebula1" width="1200" height="300" fill="url(#nebula1)"/>
  <rect class="nebula2" width="1200" height="300" fill="url(#nebula2)"/>
  <rect class="nebula3" width="1200" height="300" fill="url(#nebula3)"/>

  <!-- Scanline overlay -->
  <rect class="scanline" width="1200" height="4" fill="#7dd3fc"/>

  <!-- Starfield -->
  <g fill="#e5e7eb">
    <circle class="s1" cx="45" cy="22" r="1.4"/>
    <circle class="s2" cx="132" cy="67" r="1.1"/>
    <circle class="s3" cx="287" cy="18" r="1.6"/>
    <circle class="s4" cx="421" cy="55" r="1.0"/>
    <circle class="s5" cx="563" cy="30" r="1.3"/>
    <circle class="s6" cx="698" cy="12" r="1.5"/>
    <circle class="s7" cx="810" cy="48" r="1.2"/>
    <circle class="s8" cx="934" cy="25" r="1.4"/>
    <circle class="s9" cx="1050" cy="60" r="1.1"/>
    <circle class="s10" cx="1140" cy="20" r="1.6"/>
    <circle class="s11" cx="74" cy="255" r="1.3"/>
    <circle class="s12" cx="195" cy="278" r="1.0"/>
    <circle class="s1" cx="356" cy="262" r="1.5"/>
    <circle class="s3" cx="512" cy="285" r="1.2"/>
    <circle class="s5" cx="647" cy="270" r="1.4"/>
    <circle class="s7" cx="783" cy="258" r="1.1"/>
    <circle class="s9" cx="912" cy="280" r="1.3"/>
    <circle class="s2" cx="1075" cy="265" r="1.5"/>
    <circle class="s4" cx="1165" cy="285" r="1.0"/>
    <circle class="s6" cx="245" cy="140" r="1.2"/>
    <circle class="s8" cx="480" cy="155" r="1.4"/>
    <circle class="s10" cx="1100" cy="145" r="1.3"/>
    <circle class="s11" cx="1175" cy="170" r="1.1"/>
  </g>

  <!-- Divider line -->
  <line x1="60" y1="175" x2="1140" y2="175" stroke="#1e3a5f" stroke-width="0.5" opacity="0.6"/>

  <!-- Logo -->
  <text class="logo" x="60" y="148" filter="url(#glow)">AWAKING OS</text>
  <text font-family="'SF Pro Display','Segoe UI',system-ui,sans-serif" font-size="13" fill="#38bdf8" x="62" y="168" letter-spacing="0.35em" opacity="0.9">THE POST-AGI METASYSTEM</text>

  <!-- Boot sequence lines -->
  <g font-family="'JetBrains Mono','Fira Code',Menlo,monospace">
    <text id="l1" class="boot-line" x="60" y="200">
      <tspan class="boot-ok">[  OK  ]</tspan>
      <tspan dx="8"> boot: initializing cosmic kernel v∞.0 — consciousness layer active</tspan>
    </text>
    <text id="l2" class="boot-line" x="60" y="220">
      <tspan class="boot-ok">[  OK  ]</tspan>
      <tspan dx="8"> mount: /universe on /space-time (ext4, rw, entropy=low)</tspan>
    </text>
    <text id="l3" class="boot-line" x="60" y="240">
      <tspan class="boot-ok">[  OK  ]</tspan>
      <tspan dx="8"> link:  desci-network · ip-nft-registry · monadic-swarm online</tspan>
    </text>
    <text id="l4" class="boot-line" x="60" y="260">
      <tspan class="boot-ok">[  OK  ]</tspan>
      <tspan dx="8"> spawn: /sbin/agi-orchestrator → lemegeton-engine · agents: 72 loaded</tspan>
    </text>
    <text id="l5" class="boot-line" x="60" y="280">
      <tspan class="boot-warn">[ LIVE ]</tspan>
      <tspan dx="8" fill="#e0f2fe"> status: awakening complete · post-agi metasystem ready</tspan>
      <tspan class="cursor">_</tspan>
    </text>
  </g>
</svg>
